   </g>
   <g id="text_15">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(103.69125 244.831641)">Ridge regression predicts</text>
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(101.025 253.473609)">chronological age from the</text>
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(110.213437 262.115578)">multi-tissue signature</text>
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(88.578 270.757547)">(10-fold CV; λ selected by age R²)</text>
   </g>
   <g id="text_16">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(121.827937 378.499641)">Age acceleration (AAR) = residual of</text>
