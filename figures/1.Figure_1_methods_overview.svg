    <text style="font-size: 6.9px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(105.343922 136.987996)">T2 intensity ratios (iliopsoas, deep paraspinal,</text>
