    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(98.654625 395.783578)">Orthogonal to chronological age (no suppression)</text>
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(95.806687 404.425547)">positive = tissues look older than the patient's age</text>
   </g>
