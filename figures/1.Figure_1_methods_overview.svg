   </g>
   <g id="text_14">
    <text style="font-size: 6.9px; font-family: 'DejaVu Sans', 'Arial', 'Helvetica', sans-serif; fill: #374e55" transform="translate(142.40932 120.424222)">Scanner-robust features:</text>
